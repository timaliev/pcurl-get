# CI/CD Workflow

This workflow handles releases for pcurl-get when the `release` branch is created or updated.

## Features

- **Triggered on**: Creation or update of `release` branch
- **Platforms**:
  - macOS Darwin aarch64
  - Linux x86-64
  - Linux aarch64
- **Version detection**: Automatically extracts version from `Cargo.toml`
- **SemVer compliance**: Follows conventional commits
- **Release automation**:
  - Build binaries for all platforms
  - Create GitHub releases with changelog
  - Auto-bump version for next release

## Release Process

1. When changes are pushed to `release` branch that match conventional commits
2. Workflow detects and builds for all supported platforms
3. Releases are automatically published with changelog from commit messages
4. Version is automatically bumped for the next release

## Conventional Commits

This project follows [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/):

- `feat:`, `fix:`, `perf:`, `BREAKING CHANGE`, `docs:`, `style:`, `refactor:`, `test:`, `chore:`

Only commits starting with `feat:` or `fix:` are considered for release notes.