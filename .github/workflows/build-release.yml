name: PCurl-Get build
run-name: ${{ github.event_name }} by @${{ github.actor }} (from ${{ github.head_ref }} to ${{ github.base_ref }})

on:
  # workflow_dispatch:
  push:
    branches: [ release ]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  pre-build:
    if: ${{ (github.event_name == 'pull_request' && github.base_ref == 'release' && github.head_ref == 'develop') || (github.event_name == 'push' && github.ref_name == 'release') }}
    name: Prepare build and set new release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup git-cliff
        run: |
          # Get git-cliff for this platform
          cargo install git-cliff
          # Generate default configuration if repository doesn't have one
          [ -f cliff.toml ] || git-cliff --init

      - name: Setup Git and persistent state for env variables
        id: git-setup
        run: |
          echo XDG_CONFIG_HOME="${XDG_CONFIG_HOME}"
          XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-$(pwd)/tmp}"
          mkdir -p ${XDG_CONFIG_HOME}/git
          echo ${XDG_CONFIG_HOME} >> "$GITHUB_ENV"
          git config --file ${XDG_CONFIG_HOME}/git/config user.name "github-actions[bot]"
          git config --file ${XDG_CONFIG_HOME}/git/config user.email "github-actions[bot]@users.noreply.github.com"
          git config --file ${XDG_CONFIG_HOME}/git/config githubconf.env.env1 "XDG_CONFIG_HOME=${XDG_CONFIG_HOME}"
          BASE_BRANCH=develop
          echo ${BASE_BRANCH} >> "$GITHUB_ENV"
          git config --file ${XDG_CONFIG_HOME}/git/config githubconf.env.env2 "BASE_BRANCH=${BASE_BRANCH}"
          # CURRENT_BRANCH=${GITHUB_REF##*/} #-- now using ${{ github.ref_name }}

      - name: Detect new Release
        id: is-new-release
        run: |
          # Get commit count on this branch since diverging from `develop`
          MERGE_BASE=$(git merge-base HEAD origin/$BASE_BRANCH 2>/dev/null || echo "$(git rev-parse HEAD)")
          COMMITS_SINCE_BRANCH=$(git rev-list --count $MERGE_BASE..HEAD)
          # Detect existing Release if it's subsequent push to current branch
          if [ "$COMMITS_SINCE_BASE" -gt 1 ]; then
            NEW_RELEASE=0
            echo "Running new Release job from ${{ github.head_ref }} to ${{ github.base_ref }}"
          else
            NEW_RELEASE=1
            echo "Running existing Release job from ${{ github.head_ref }} to ${{ github.base_ref }}"
          fi
          echo ${NEW_RELEASE} >> "$GITHUB_ENV"
          git config --file ${XDG_CONFIG_HOME}/git/config githubconf.env.env3 "NEW_RELEASE=${NEW_RELEASE}"

      - name: Bump version for new release using git-cliff
        id: new-version
        if: github.ref_name == 'release' && env.NEW_RELEASE == '1'
        run: |
          NEW_VERSION_TAG="$(git-cliff --bumped-version)"
          NEW_VERSION=$(echo ${NEW_VERSION_TAG} | sed -E 's/^v//')
          echo "New version tag: $NEW_VERSION_TAG"
          echo "New version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION_TAG" >> "$GITHUB_ENV"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Use the same version for existing release
        id: exist-version
        if: github.ref_name == 'release' && env.NEW_RELEASE == '0'
        run: |
          NEW_VERSION_TAG="v$(cat VERSION)"
          NEW_VERSION="$(cat VERSION)"
          echo "New version tag: $NEW_VERSION_TAG"
          echo "New version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION_TAG" >> "$GITHUB_ENV"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Store version configuration in Git config
        run: |
          git config --file ${XDG_CONFIG_HOME}/git/config githubconf.env.env4 "NEW_VERSION=${NEW_VERSION}"
          git config --file ${XDG_CONFIG_HOME}/git/config githubconf.env.env5 "NEW_VERSION_TAG=${NEW_VERSION_TAG}"

      - name: Upload persistent Git configuration for later stages
        uses: actions/upload-artifact@v7
        with:
          name: gitconfig
          path: tmp/git/config

  build-for-release:
    name: Build for Release on matrix targets
    needs: pre-build
    runs-on: ${{ matrix.os }}
    outputs:
      upload-artifact-id: ${{ steps.artifact-upload.outputs.artifact-upload }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            architecture: aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            architecture: x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            architecture: aarch64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download persistent Git configuration
        uses: actions/download-artifact@v8
        with:
          name: gitconfig
          path: tmp/git/
          
      - name: Setup Git
        id: git-setup
        run: |
          export $(git config --file tmp/git/config githubconf.env.env1)
          export $(git config --file tmp/git/config githubconf.env.env2)
          export $(git config --file tmp/git/config githubconf.env.env3)
          export $(git config --file tmp/git/config githubconf.env.env4)
          export $(git config --file tmp/git/config githubconf.env.env5)
          echo ${XDG_CONFIG_HOME} >> "$GITHUB_ENV"
          echo ${BASE_BRANCH} >> "$GITHUB_ENV"
          echo ${NEW_RELEASE} >> "$GITHUB_ENV"
          echo ${NEW_VERSION} >> "$GITHUB_ENV"
          echo ${NEW_VERSION_TAG} >> "$GITHUB_ENV"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Install musl-tools for static linking
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            --allow-unauthenticated \
            musl-tools gcc-aarch64-linux-gnu musl-dev
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install musl-cross
          rustup target add ${{ matrix.target }}

      - name: Setup build tools
        id: build-tools
        run: |
          # Compile all of my Rust tools
          cd tools
          rustc cargo_version.rs

          # Make it available in PATH
          echo "$(pwd)" >> $GITHUB_PATH

          # Upload as artifact
          # echo "tool-path=$(pwd)/cargo_version" >> $GITHUB_ENV

      - name: Update version in Cargo.toml (${{ env.NEW_VERSION_TAG }})
        if: github.ref_name == 'release' && env.NEW_RELEASE == '1'
        run: |
          sed -E -i "s/^version = \"[^\"]*\"/version = \"${NEW_VERSION}\"/" Cargo.toml

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Tests on ${{ matrix.architecture }}
        run: |
          cargo test --all

      - name: Build for ${{ matrix.architecture }}
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        id: artifact-upload
        with:
          name: pcurl-get-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pcurl-get
          if-no-files-found: warn

  prep-release:
    name: Prepare release and PR to default branch
    needs: build-for-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup git-cliff
        run: |
          # Get git-cliff for this platform
          cargo install git-cliff
          # Generate default configuration if repository doesn't have one
          [ -f cliff.toml ] || git-cliff --init

      - name: Download persistent Git configuration
        uses: actions/download-artifact@v8
        with:
          name: gitconfig
          path: tmp/git/

      - name: Setup Git
        id: git-setup
        run: |
          export $(git config --file tmp/git/config githubconf.env.env1)
          export $(git config --file tmp/git/config githubconf.env.env2)
          export $(git config --file tmp/git/config githubconf.env.env3)
          export $(git config --file tmp/git/config githubconf.env.env4)
          export $(git config --file tmp/git/config githubconf.env.env5)
          echo ${XDG_CONFIG_HOME} >> "$GITHUB_ENV"
          echo ${BASE_BRANCH} >> "$GITHUB_ENV"
          echo ${NEW_RELEASE} >> "$GITHUB_ENV"
          echo ${NEW_VERSION} >> "$GITHUB_ENV"
          echo ${NEW_VERSION_TAG} >> "$GITHUB_ENV"
          # We are going to commit to this branch so update .gitignore
          touch .gitignore
          # Ensure tmp directory created for Git persistency is excluded
          [ -z "$(grep -E '^tmp/' .gitignore)" ] && echo 'tmp/' >> .gitignore

      - name: Create/update version tag
        run: |
          # git describe --tags --abbrev=0 HEAD^ 2>/dev/null
          # Ensure tag does not exist
          git tag -d "${NEW_VERSION_TAG}" 2>/dev/null || true
          # Add new tag for release
          git tag -f -a "${NEW_VERSION_TAG}" -m "Release ${NEW_VERSION_TAG}"
          # Create VERSION file in the root of repo for possible subsequent pushes to this release
          echo ${NEW_VERSION} > VERSION

      - name: Generate CHANGELOG with git-cliff
        id: changelog
        run: |
          echo "Generating CHANGELOG.md..."
          git-cliff -output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push release changes
        run: |
          git commit -m "chore: for release ${NEW_VERSION_TAG}" -- VERSION CHANGELOG.md
          # git push --tags
          # git push --tags origin ${{ github.ref_name }}
          # Push will be performed by next step: peter-evans/create-pull-request@v5

      - name: Create PR from release to master
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: prepare release ${{ env.NEW_VERSION_TAG }} from release branch
          branch: release
          base: master
          title: |
            release: merge release → master
          body: |
            ## Merge release branch into master
            
            This PR merges the `release` branch into `master` for production deployment.
            
            ### Review checklist:
            - [ ] All tests pass
            - [ ] Changelog updated
            - [ ] Version bumped
            
            ---
            Automated changes by [create-pull-request](https://github.com/peter-evans/create-pull-request) GitHub action
          labels: |
            release
            automated pr
          draft: false
          delete-branch: true

  notify:
    needs: [pre-build, build-for-release, prep-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Workflow succeeded"
          else
            echo "❌ Workflow failed: ${{ job.status }}"
          fi