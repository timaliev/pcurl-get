name: PCurl-Get Release
run-name: ${{ github.event_name }} by @${{ github.actor }}

on:
  push:
    branches: [ master ]
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  check-release:
    name: Check if commits to be released are pushed
    runs-on: ubuntu-latest
    outputs:
      cancel_workflow: ${{ steps.last-commit-tag.outputs.cancel_workflow == 'true' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Where to store persistent Git configuration
        run: |
          touch .github/config
          cat <<EOF | tee -a .git/config >/dev/null
          # Persistent Git configuration added to .git/config
          [include]
              path = ${{ github.workspace }}/.github/config
          EOF

      - name: Setup Git
        id: git-setup
        run: |
          echo -e "Git persistent state for env file is: ${{ github.workspace }}/.github/config"
          export "GITHUBCONF=${{ github.workspace }}/.github/config"
          echo "GITHUBCONF=${GITHUBCONF}" >> "$GITHUB_ENV"
          export $(git config githubconf.env.env5)
          echo "NEW_VERSION_TAG=${NEW_VERSION_TAG}" >> "$GITHUB_ENV"

      - name: Check that last commit has annotated tag with current version
        id: last-commit-tag
        run: |
          # LAST_SHA=$(git rev-parse HEAD)
          TAGS_PR=$(git describe --tags --exact-match HEAD^1 2>/dev/null || true)
          TAGS=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          echo "cancel_workflow=true" >> "$GITHUB_OUTPUT"
          if [ -z "${TAGS_PR}" ]; then
            if [ -n "${TAGS}" ]; then
              for tag in $TAGS; do
                if [[ "${tag}" == "${NEW_VERSION_TAG}" ]]; then
                  echo "Found tag equal to NEW_VERSION=${NEW_VERSION_TAG} on HEAD ($(git rev-parse --short HEAD))"
                  echo "Continue to Release..."
                  echo "cancel_workflow=false" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              done
            fi
          else
            for tag in $TAGS_PR; do
              if [[ "${tag}" == "${NEW_VERSION_TAG}" ]]; then
                echo "Found tag equal to NEW_VERSION=${NEW_VERSION_TAG} on HEAD^1 ($(git rev-parse --short HEAD^1))"
                echo "Continue to Release..."
                echo "cancel_workflow=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
          fi
          echo "No tags equal to NEW_VERSION=${NEW_VERSION_TAG} found on HEAD ($(git rev-parse --short HEAD)) or HEAD^1 ($(git rev-parse --short HEAD^1))"
          echo "Cancelling workflow..."

  just-release:
    needs: check-release
    name: Release software
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ needs.check-release.outputs.cancel_workflow }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Where to store persistent Git configuration
        run: |
          touch .github/config
          cat <<EOF | tee -a .git/config >/dev/null
          # Persistent Git configuration added to .git/config
          [include]
              path = ${{ github.workspace }}/.github/config
          EOF

      - name: Setup Git
        id: git-setup
        run: |
          export "GITHUBCONF=${{ github.workspace }}/.github/config"
          echo -e "Git persistent state for env file is: ${GITHUBCONF}"
          echo "GITHUBCONF=${GITHUBCONF}" >> "$GITHUB_ENV"
          export $(git config githubconf.env.env2)
          export $(git config githubconf.env.env3)
          export $(git config githubconf.env.env4)
          export $(git config githubconf.env.env5)
          export $(git config githubconf.env.env6)
          echo "BASE_BRANCH=${BASE_BRANCH}" >> "$GITHUB_ENV"
          echo "NEW_RELEASE=${NEW_RELEASE}" >> "$GITHUB_ENV"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "NEW_VERSION_TAG=${NEW_VERSION_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_RUN_ID=${RELEASE_RUN_ID}" >> "$GITHUB_ENV"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup git-cliff
        run: |
          # Get git-cliff for this platform
          cargo +stable install git-cliff
          # Generate default configuration if repository doesn't have one
          if [ -f cliff.toml ]; then
            echo "git-cliff configuration $(pwd)/cliff.toml is present in this repository ('${{ github.repository }}' on '${{ github.ref_name }}' branch)"
          else
            git-cliff --init
            echo "Created git-cliff default configuration: $(pwd)/cliff.toml"
          fi

      - name: Generate release notes with git-cliff
        id: release-notes
        run: |
          echo "Generating release notes..."
          RELEASE_NOTES="$(git-cliff --config github --latest)\n\n"
          RELEASE_NOTES+"### Platforms\n\n"
          RELEASE_NOTES+"- Linux x86-64 gnu-libc\n"
          RELEASE_NOTES+"- Linux x86-64 musl (static)\n"
          RELEASE_NOTES+"- Linux i686 gnu-libc\n"
          RELEASE_NOTES+"- Linux i686-64 musl (static)\n"
          RELEASE_NOTES+"- Linux aarch64 gnu-libc\n"
          RELEASE_NOTES+"- Linux aarch64 musl (static)\n\n"
          RELEASE_NOTES+"- macOS Darwin x86-64\n"
          RELEASE_NOTES+"- macOS Darwin aarch64\n"
          echo "notes<<EOF"
          echo "$RELEASE_NOTES"
          echo "EOF"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download binaries built for different platforms
        uses: actions/download-artifact@v8
        with:
          pattern: pcurl-get-*
          path: tmp/assets/
          merge-multiple: true
          run-id: ${{ env.RELEASE_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Change default compression to platform specific (Linux)
        run: |
          cd tmp/assets
          apt install unzip -y
          for i in $(echo *.zip); do
            if [[ "${i}" == *"-linux-"* ]]; then
              BASENAME=$(echo $i | sed -E 's/\.zip$//')
              echo "Re-archive zip to tar.gz for ${BASENAME}"
              unzip -qq -o ${i}
              tar -zcvf pcurl-get "${BASENAME}.tar.gz"
              rm -f ${i} pcurl-get
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref_name == 'master'
        with:
          tag_name: ${{ env.NEW_VERSION_TAG }}
          name: Release ${{ env.NEW_VERSION_TAG }}
          body: ${{ steps.release-notes.outputs.notes }}
          files: |
            tmp/assets/pcurl-get-*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-release:
    name: Merge release back onto development branch
    needs: just-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Where to store persistent Git configuration
        run: |
          touch .github/config
          cat <<EOF | tee -a .git/config >/dev/null
          # Persistent Git configuration added to .git/config
          [include]
              path = ${{ github.workspace }}/.github/config
          EOF

      - name: Setup Git
        id: git-setup
        run: |
          echo -e "Git persistent state for env file is: ${{ github.workspace }}/.github/config"
          echo "GITHUBCONF=${{ github.workspace }}/.github/config" >> "$GITHUB_ENV"
          export $(git config githubconf.env.env2)
          export $(git config githubconf.env.env3)
          export $(git config githubconf.env.env4)
          export $(git config githubconf.env.env5)
          echo "BASE_BRANCH=${BASE_BRANCH}" >> "$GITHUB_ENV"
          echo "NEW_RELEASE=${NEW_RELEASE}" >> "$GITHUB_ENV"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "NEW_VERSION_TAG=${NEW_VERSION_TAG}" >> "$GITHUB_ENV"

      - name: Bump version for next release
        run: |
          NEW_VERSION=${NEW_VERSION}+
          sed -E -i "s/^version = \"[^\"]*\"/version = \"${NEW_VERSION}\"/" Cargo.toml
          echo ${NEW_VERSION} > VERSION

      - name: Merge back to base development branch
        run: |
          # git checkout master
          # git pull
          # Done with the actions/checkout@v6 above
          git checkout "${BASE_BRANCH}"
          git merge ${{ github.ref_name }}  # Brings in version tag and changelog
          # Force delete `release` branch if possible and push all back into repository
          git branch -D release || true
          git push --all origin

  notify:
    needs: post-release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: |
          if [[ "${{ needs.post-release.result }}" == "success" ]]; then
            echo "✅ Workflow succeeded"
          else
            echo "❌ Workflow failed: ${{ needs.post-release.result }}"
          fi
